services:
  # ---------------- REDIS ----------------
  redis:
    image: redis:7-alpine
    container_name: image-similarity-redis
    command: redis-server --appendonly yes
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ 'CMD', 'redis-cli', 'ping' ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    mem_limit: 512m
    cpus: 0.5
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  # ---------------- POSTGRES + PGVECTOR ----------------
  db:
    image: pgvector/pgvector:pg16
    container_name: image-similarity-postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U $POSTGRES_USER -d $POSTGRES_DB' ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    mem_limit: 2g
    cpus: 1.5
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  # ---------------- MINIO AIStor ----------------
  minio:
    image: quay.io/minio/aistor/minio:latest
    container_name: image-similarity-minio
    command: server /data --console-address ":9001" --license /minio.license
    restart: unless-stopped
    # Only pass root login credentials to the MinIO container.
    # MINIO_ACCESS_KEY / MINIO_SECRET_KEY are service-account keys used by
    # the application and must NOT be injected here (they would shadow the
    # root credentials in legacy MinIO builds).
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
      - ./minio.license:/minio.license:ro
    ports:
      - '9000:9000'
      - '9001:9001'
    networks:
      - backend
    healthcheck:
      test: [ 'CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live' ]
      interval: 20s
      timeout: 10s
      retries: 3
    mem_limit: 1g
    cpus: 1.0
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  # ---------------- WORKER POOL ----------------
  worker:
    build:
      context: .
      target: api
      args:
        HF_TOKEN: ${HF_TOKEN}
    image: image-similarity-worker
    restart: unless-stopped
    deploy:
      replicas: 4
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: http://localhost:9000
      ENABLE_MINIO_LISTENER: 'false' # Workers only process jobs, don't listen
    command: python tools/run_worker.py
    networks:
      - backend
    mem_limit: 2g
    cpus: 1.0
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  # ---------------- EVENT LISTENER ----------------
  listener:
    build:
      context: .
      target: api
      args:
        HF_TOKEN: ${HF_TOKEN}
    image: image-similarity-worker
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: http://minio:9000
      ENABLE_MINIO_LISTENER: 'true' # Dedicated process for real-time sync
    command: python tools/run_worker.py
    networks:
      - backend
    mem_limit: 512m
    cpus: 0.5
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  # ---------------- API ----------------
  app:
    build:
      context: .
      target: api
      args:
        HF_TOKEN: ${HF_TOKEN}
    image: image-similarity-api
    container_name: image-similarity-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: http://localhost:9000
    # Single worker required: WebSocket PubSub listener uses asyncio startup task
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --workers 1
    expose:
      - '8000'
    networks:
      - backend
      - frontend
    mem_limit: 2g
    cpus: 1.0
    healthcheck:
      test: [ 'CMD', 'curl', '-f', 'http://localhost:8000/health' ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  # ---------------- FRONTEND ----------------
  frontend:
    build:
      context: .
      target: frontend
    image: image-similarity-frontend
    container_name: image-similarity-frontend
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    ports:
      - '80:80'
    networks:
      - frontend
      - backend
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

# ---------------- NETWORKS ----------------
networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge

# ---------------- VOLUMES ----------------
volumes:
  postgres_data:
  redis_data:
  minio_data:
